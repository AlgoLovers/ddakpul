name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # 시크릿을 잡 레벨 env로 올려, 아래 텔레그램 스텝의 if 조건에서 존재 여부를 검사할 수 있게 한다.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Static analysis
        run: ./gradlew detekt

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ddakpul-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # 텔레그램 시크릿이 설정된 경우에만 실행된다(미설정 저장소에서 CI가 붉어지지 않도록).
      # 전송 실패(예: 사용자가 봇을 아직 Start 안 함)는 빌드 실패가 아니므로 경고만 남긴다.
      - name: Send debug APK to Telegram
        if: ${{ github.event_name == 'push' && env.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          response=$(curl -sS \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F caption="🧮 DdakPul debug APK — ${GITHUB_REF_NAME}@${GITHUB_SHA::7}" \
            -F document=@app/build/outputs/apk/debug/app-debug.apk \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument")
          if echo "$response" | grep -q '"ok":true'; then
            echo "APK delivered to Telegram."
          else
            echo "::warning::Telegram delivery failed (bot not started yet?): $response"
          fi

      # 장애 알림 — 어느 스텝이든 실패하면 텔레그램으로 즉시 알린다.
      - name: Notify CI failure to Telegram
        if: ${{ failure() && env.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          curl -sS \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🔴 DdakPul CI 실패 — ${GITHUB_REF_NAME}@${GITHUB_SHA::7}
          로그: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
