name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write # nightly 릴리스에 APK 업로드
    env:
      # 시크릿을 잡 레벨 env로 올려, 아래 텔레그램 스텝의 if 조건에서 존재 여부를 검사할 수 있게 한다.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 문제은행 결정성 게이트 — 재생성 산출이 커밋본과 바이트 동일해야 한다(0-diff).
      # 파이프라인(생성기)과 데이터(JSON)가 어긋난 채 머지되는 것을 차단하고,
      # checks.py 품질 게이트(중복정의·한/영 대칭·난이도 제약)도 함께 강제된다.
      - name: Problem bank determinism & quality gate
        run: |
          python3 tools/problemgen/generate.py
          git diff --exit-code \
            app/src/main/assets/problems_generated.json \
            app/src/main/assets/problems_generated_en.json \
            tools/problemgen/method_codes.json

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Static analysis
        run: ./gradlew detekt

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ddakpul-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # 전체 ABI 빌드(111MB)는 봇 한도(50MB)를 넘으므로, 배달용은 arm64 단일 ABI(≈46MB)로
      # 다시 빌드해 **원래 방식(파일 직접 전송)** 으로 보낸다. 사용자 기기(갤럭시 탭)는 arm64.
      # main 푸시(릴리스 머지)에만 — develop까지 보내면 같은 코드가 두 번씩 배달된다.
      - name: Assemble arm64 APK for Telegram
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' && env.TELEGRAM_BOT_TOKEN != '' }}
        run: ./gradlew assembleDebug -PabiSplit

      # 전송 실패(크기 초과·봇 미시작 등)는 빌드 실패가 아니므로 경고 + 링크 폴백.
      - name: Send debug APK to Telegram
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' && env.TELEGRAM_BOT_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          response=$(curl -sS \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F caption="🧮 DdakPul debug APK — ${GITHUB_REF_NAME}@${GITHUB_SHA::7}" \
            -F document=@app/build/outputs/apk/debug/app-arm64-v8a-debug.apk \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument")
          if echo "$response" | grep -q '"ok":true'; then
            echo "APK delivered to Telegram."
          else
            echo "::warning::직접 전송 실패 — 링크 폴백: $response"
            gh release view nightly >/dev/null 2>&1 || \
              gh release create nightly --prerelease --title "Nightly debug build" \
                --notes "main 브랜치 최신 디버그 빌드(자동 갱신). 스토어 배포용이 아닙니다."
            gh release upload nightly app/build/outputs/apk/debug/app-debug.apk --clobber
            curl -sS -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="🧮 DdakPul debug APK — ${GITHUB_REF_NAME}@${GITHUB_SHA::7}
          (파일 전송 실패 — 링크로 대신 드려요) ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/nightly/app-debug.apk" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" >/dev/null
          fi

      # 장애 알림 — 어느 스텝이든 실패하면 텔레그램으로 즉시 알린다.
      - name: Notify CI failure to Telegram
        if: ${{ failure() && env.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          curl -sS \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🔴 DdakPul CI 실패 — ${GITHUB_REF_NAME}@${GITHUB_SHA::7}
          로그: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
